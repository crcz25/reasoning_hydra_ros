---
type: RosInput
tf_verbosity: 1
clear_queue_on_fail: true
receivers:
  - type: PointcloudImageReceiver
    queue_size: 500
    tf_max_tries: 1
    tf_wait_duration_s: 0.02
    sensor:
      type: camera_lidar_fusion_info
      is_asymmetric: false
      vertical_fov: 90.0
      horizontal_fov: 360.0
      horizontal_resolution: 1.422
      vertical_resolution: 0.711
      min_range: $(arg sensor_min_range)
      max_range: $(arg sensor_max_range)
      camera_info_topic: $(arg rgb_info_topic)
      extrinsics:
        type: ros
        sensor_frame: $(arg lidar_frame)
